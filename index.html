<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerry Bird Repository</title>
    <style>
        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            height: 100%;
            font-family: 'Arial Black', Impact, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Loading Screen Overlay */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loader-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        .progress-container {
            width: 300px;
            height: 30px;
            background-color: #222;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid #ff3333;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.1s linear;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffffff;
            mix-blend-mode: difference;
            pointer-events: none;
        }

        /* Scrolling Plastered Background */
        .bg-scroll {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.15;
            padding: 10px;
            font-size: 2.2rem;
            line-height: 1.2;
            word-wrap: break-word;
            user-select: none;
        }

        /* Main Content Container */
        .main-content {
            position: relative;
            z-index: 2;
            min-height: 150vh; /* Extra height to allow scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10vh;
        }

        .center-card {
            position: sticky;
            top: 20vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: rgba(20, 20, 20, 0.8);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 51, 51, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }

        /* Jerry Bird Image Styling */
        .jerry-img {
            max-width: 350px;
            width: 100%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
            transition: transform 0.3s ease;
        }

        .jerry-img:hover {
            transform: scale(1.03);
        }

        /* Download Button */
        .download-btn {
            display: inline-block;
            background: #ff3333;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4);
        }

        .download-btn:hover {
            background: #ff5555;
            box-shadow: 0 5px 25px rgba(255, 51, 51, 0.6);
        }

        .download-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="loader-title">JERRY BIRD</div>
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
            <div class="progress-text">Jerry Bird Jerry Bird</div>
        </div>
    </div>

    <div class="bg-scroll" id="bg-text"></div>

    <main class="main-content">
        <div class="center-card">
            <img src="jerrybird.jpg" alt="Jerry Bird" class="jerry-img">
            
            <a href="jerrybird.jpg" download="jerrybird.jpg" class="download-btn">
                Download Jerry Bird
            </a>
        </div>
    </main>

    <script>
        // 1. Fill the background dynamically with "Jerry Bird"
        const bgContainer = document.getElementById('bg-text');
        const phrase = "Jerry Bird ";
        // Generates enough text to plaster the background screen space
        bgContainer.innerText = phrase.repeat(800);

        // 2. Loading Bar Animation Logic
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('bar');
            const loader = document.getElementById('loader-overlay');
            let width = 0;
            
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    // Fade out the loader panel
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                } else {
                    width += 2; // Speed control for loading
                    bar.style.width = width + '%';
                }
            }, 30); 
        });
    </script>
</body>
</html>
